<html lang="ar" dir="rtl">
<head>

<title>BEAST ENGINE | منصة الخيارات الاستباقية</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060a12;--c1:#0b1120;--c2:#111b30;--c3:#182444;--c4:#1e3058;--t1:#e0e7f1;--t2:#7a90b5;--t3:#4c6488;
--g:#00ff88;--g3:rgba(0,255,136,.08);--r:#ff2d55;--r3:rgba(255,45,85,.08);
--b:#0af;--b3:rgba(0,170,255,.08);--y:#fc0;--y3:rgba(255,204,0,.08);
--p:#c840ff;--p3:rgba(200,64,255,.08);--o:#ff6b35;--o3:rgba(255,107,53,.08);
--c:#00f0ff;--gd:#ffd000;--brd:#152040;
--f:'Tajawal',sans-serif;--m:'IBM Plex Mono',monospace}
body{font-family:var(--f);background:var(--bg);color:var(--t1);font-size:12px;overflow:hidden;height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:var(--c1)}::-webkit-scrollbar-thumb{background:var(--c4);border-radius:2px}
input,select,button,textarea{font-family:var(--f);outline:none;border:none;background:none;color:var(--t1)}button{cursor:pointer}
.bd{padding:1px 6px;border-radius:3px;font-size:8px;font-weight:700;display:inline-block}
.bd-g{background:var(--g3);color:var(--g)}.bd-r{background:var(--r3);color:var(--r)}.bd-y{background:var(--y3);color:var(--y)}
.bd-b{background:var(--b3);color:var(--b)}.bd-p{background:var(--p3);color:var(--p)}

#hd{height:40px;background:var(--c1);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 10px;gap:10px;flex-shrink:0}
#logo{font-size:15px;font-weight:900;display:flex;align-items:center;gap:5px}
#logo .be{color:var(--g);text-shadow:0 0 15px rgba(0,255,136,.2)}
#logo em{font-style:normal;font-size:8px;color:var(--bg);background:var(--g);padding:1px 5px;border-radius:2px;font-weight:700}
#sym{background:var(--c2);border:1px solid var(--brd);border-radius:5px;padding:4px 10px;width:120px;font-size:13px;font-weight:700;text-align:center;text-transform:uppercase;font-family:var(--m);transition:.2s}
#sym:focus{border-color:var(--g);box-shadow:0 0 8px rgba(0,255,136,.15)}
#clk{font-family:var(--m);font-size:10px;color:var(--t3);margin-right:auto}
#ms{font-size:9px}

#mn{flex:1;display:flex;overflow:hidden}
#ct{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#sd{width:300px;background:var(--c1);border-right:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}

/* INFO BAR */
#nf{display:flex;align-items:center;gap:10px;padding:4px 8px;background:var(--c1);border-bottom:1px solid var(--brd);flex-wrap:wrap;flex-shrink:0}
.np{font-size:22px;font-weight:900;font-family:var(--m);letter-spacing:-1px}
.nc{font-size:11px;font-weight:700;padding:2px 6px;border-radius:5px;font-family:var(--m)}
.ns{width:1px;height:22px;background:var(--brd)}
.ni{text-align:center}.ni .nl{font-size:7px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}.ni .nv{font-size:11px;font-weight:600;font-family:var(--m)}

/* CHART */
#chartWrap{flex-shrink:0;height:420px;background:var(--c1);border-bottom:1px solid var(--brd);position:relative}
#tvChart{width:100%;height:100%;border:none}

/* TABS */
#tB{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#tH{display:flex;background:var(--bg);border-bottom:1px solid var(--brd);overflow-x:auto;flex-shrink:0}
.tb{padding:7px 11px;font-size:10px;font-weight:600;color:var(--t3);white-space:nowrap;border-bottom:2px solid transparent;transition:.12s}
.tb:hover{color:var(--t2)}.tb.on{color:var(--g);border-bottom-color:var(--g)}
#tC{flex:1;overflow-y:auto;padding:5px;font-size:11px}

/* TABLE */
.ot{width:100%;border-collapse:collapse;font-size:9px;font-family:var(--m)}
.ot th{background:var(--bg);padding:4px 5px;text-align:center;color:var(--t3);font-weight:600;position:sticky;top:0;z-index:3;font-size:8px}
.ot td{padding:3px 5px;text-align:center;border-bottom:1px solid rgba(21,32,64,.4)}
.ot tr:hover td{background:var(--c2)}
.ot .sk{background:var(--bg);font-weight:700;color:var(--gd);border-left:2px solid var(--gd);border-right:2px solid var(--gd)}
.ot .ci{background:rgba(0,255,136,.02)}.ot .pi{background:rgba(255,45,85,.02)}
.ot .atm{background:rgba(255,208,0,.03)!important}

/* GREEKS / STATS */
.gk{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.gc{background:var(--c2);border-radius:5px;padding:8px;text-align:center;border:1px solid var(--brd)}
.gc .gn{font-size:8px;color:var(--t3);text-transform:uppercase}.gc .gv{font-size:18px;font-weight:900;font-family:var(--m)}
.gc .gb{height:2px;background:var(--bg);border-radius:1px;margin-top:4px;overflow:hidden}
.gc .gf{height:100%;border-radius:1px}
.gs{padding:7px 9px;background:var(--c2);border-radius:5px;margin-top:6px;font-size:10px;line-height:1.6;border-right:3px solid var(--gd)}

/* SIGNAL CARDS */
.sig{background:var(--c2);border:1px solid var(--brd);border-radius:8px;padding:10px;margin-bottom:5px;position:relative;overflow:hidden}
.sig::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sig.bull::before{background:linear-gradient(90deg,var(--g),transparent)}
.sig.bear::before{background:linear-gradient(90deg,var(--r),transparent)}
.sig-entry{margin-top:6px;padding:6px;background:var(--c3);border-radius:5px;border-right:3px solid var(--g);font-size:10px}
.sig-entry.sell{border-right-color:var(--r)}

/* STRATEGY */
.sp2{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px}
.spb{padding:3px 8px;border-radius:5px;font-size:9px;font-weight:600;border:1px solid var(--brd);transition:.12s}
.spb:hover{border-color:var(--b);color:var(--b)}.spb.on{background:var(--b3);color:var(--b);border-color:rgba(0,170,255,.3)}
.sl2{display:flex;align-items:center;gap:5px;padding:4px;background:var(--c2);border-radius:5px;margin-bottom:2px;font-size:10px}
.sl2 select,.sl2 input{background:var(--bg);border:1px solid var(--brd);border-radius:3px;padding:2px 5px;font-size:9px;font-family:var(--m)}
#plC{width:100%;height:180px;display:block;background:var(--bg);border-radius:5px;border:1px solid var(--brd);margin-top:6px}
.ss{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:5px}
.si{background:var(--c2);border-radius:5px;padding:5px;text-align:center}
.si .sl3{font-size:7px;color:var(--t3)}.si .sv3{font-size:12px;font-weight:700;font-family:var(--m)}

/* SIDE */
.sec{border-bottom:1px solid var(--brd);padding:6px 8px}
.st{font-size:10px;font-weight:700;color:var(--g);margin-bottom:5px;display:flex;align-items:center;gap:4px}
.wi{display:flex;justify-content:space-between;align-items:center;padding:3px 5px;border-radius:3px;cursor:pointer;transition:.1s;font-size:10px}
.wi:hover{background:var(--c2)}.wi.ac{background:var(--c3);border-right:2px solid var(--g)}
.fl{display:flex;align-items:center;gap:5px;padding:3px 5px;background:var(--c2);border-radius:5px;margin-bottom:2px;border-right:2px solid var(--g);font-size:9px}
.fl.br{border-right-color:var(--r)}

/* AI */
#aw{flex:1;display:flex;flex-direction:column;min-height:160px;overflow:hidden}
#am{flex:1;overflow-y:auto;padding:5px;display:flex;flex-direction:column;gap:5px}
.ai{padding:5px 8px;border-radius:5px;font-size:10px;line-height:1.5;max-width:93%}
.ai.u{background:var(--b3);color:var(--b);align-self:flex-end}
.ai.bt{background:var(--c2);align-self:flex-start;border-right:2px solid var(--g)}
.aq{display:flex;flex-wrap:wrap;gap:2px;padding:3px 5px}
.aqb{font-size:8px;padding:2px 6px;border-radius:8px;border:1px solid var(--brd);color:var(--t3);transition:.12s}
.aqb:hover{border-color:var(--g);color:var(--g)}
#ab{display:flex;gap:3px;padding:5px;border-top:1px solid var(--brd)}
#ain{flex:1;background:var(--c2);border:1px solid var(--brd);border-radius:5px;padding:5px 8px;font-size:10px;resize:none;height:30px}
#asn{background:var(--g);color:var(--bg);font-weight:700;padding:0 12px;border-radius:5px;font-size:11px}

/* FEAR/GREED */
#fgC{width:200px;height:120px;margin:0 auto;display:block}
.fv{font-size:32px;font-weight:900;font-family:var(--m);text-align:center}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:3px;font-size:9px}
.ff{display:flex;justify-content:space-between;padding:2px 5px;background:var(--c2);border-radius:2px}

.ld{text-align:center;padding:20px;color:var(--t3);font-size:11px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}.pulse{animation:pulse 1.5s infinite}
@media(max-width:900px){#sd{display:none}}
</style>
</head>

<script>
const S={sym:'AAPL',price:0,prev:0,name:'',calls:[],puts:[],exps:[],exp:null,
  tab:'sig',gLv:[],gk:{d:0,g:0,v:0,t:0},pcr:1,ivr:50,fg:50,flow:[],
  stL:[],stP:'',loading:0,dataError:0,
  wl:['AAPL','TSLA','NVDA','MSFT','AMZN','META','GOOGL','AMD','SPY','QQQ','NFLX','COIN','SOFI','PLTR','SMCI','ARM','AVGO','CRM','BA','JPM','XOM','MARA','IWM','DIA'],
  wlD:{}};

const $=id=>document.getElementById(id);
const fN=(n,d=2)=>n!=null?Number(n).toFixed(d):'-';
const fK=n=>{if(n==null)return'-';const a=Math.abs(n);if(a>=1e9)return(n/1e9).toFixed(1)+'B';if(a>=1e6)return(n/1e6).toFixed(1)+'M';if(a>=1e3)return(n/1e3).toFixed(1)+'K';return''+Math.round(n)};

// ═══ SETTINGS ═══
function openSetup(){} // no setup needed - server handles everything
function closeSetup(){}

// ═══ BLACK-SCHOLES ═══
function nCDF(x){const a1=.254829592,a2=-.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=.3275911;
  const s=x<0?-1:1;x=Math.abs(x)/Math.SQRT2;const t=1/(1+p*x);return .5*(1+s*(1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x)))}
function nPDF(x){return Math.exp(-x*x/2)/Math.sqrt(2*Math.PI)}
function bs(spot,K,T,r,sig,tp){
  if(T<=0||sig<=0)return{d:0,g:0,t:0,v:0};
  const d1=(Math.log(spot/K)+(r+sig*sig/2)*T)/(sig*Math.sqrt(T)),d2=d1-sig*Math.sqrt(T),nd1=nPDF(d1);
  const gamma=nd1/(spot*sig*Math.sqrt(T)),vega=spot*nd1*Math.sqrt(T)/100;
  let delta,theta;
  if(tp==='call'){delta=nCDF(d1);theta=(-(spot*nd1*sig)/(2*Math.sqrt(T))-r*K*Math.exp(-r*T)*nCDF(d2))/365;}
  else{delta=nCDF(d1)-1;theta=(-(spot*nd1*sig)/(2*Math.sqrt(T))+r*K*Math.exp(-r*T)*nCDF(-d2))/365;}
  return{d:+delta.toFixed(4),g:+gamma.toFixed(6),t:+theta.toFixed(4),v:+vega.toFixed(4)}}

// ═══ GEX ═══
function calcGEX(calls,puts,spot){
  const lv={};
  [...calls,...puts].forEach(o=>{
    const K=o.k,oi=o.oi||0,tp=calls.includes(o)?'call':'put';if(!oi)return;
    const T=o.exp?Math.max((o.exp*1000-Date.now())/(365.25*864e5),1/365):30/365;
    const gk=bs(spot,K,T,.05,o.iv||.3,tp);
    const gex=gk.g*oi*100*spot*spot*.01;
    if(!lv[K])lv[K]={k:K,cG:0,pG:0,net:0,cOI:0,pOI:0};
    if(tp==='call'){lv[K].cG+=gex;lv[K].cOI+=oi}else{lv[K].pG-=gex;lv[K].pOI+=oi}
    lv[K].net=lv[K].cG+lv[K].pG;
  });
  return Object.values(lv).sort((a,b)=>a.k-b.k)}

// ═══ AGGREGATE GREEKS ═══
function calcAgg(calls,puts,spot){
  let td=0,tg=0,tv=0,tt=0,cV=0,pV=0;
  const proc=(arr,tp)=>{arr.forEach(o=>{const T=o.exp?Math.max((o.exp*1000-Date.now())/(365.25*864e5),1/365):30/365;
    const gk=bs(spot,o.k,T,.05,o.iv||.3,tp);const w=o.oi||1;td+=gk.d*w;tg+=gk.g*w;tv+=gk.v*w;tt+=gk.t*w;
    if(tp==='call')cV+=o.vol||0;else pV+=o.vol||0;})};
  proc(calls,'call');proc(puts,'put');
  S.pcr=cV>0?+(pV/cV).toFixed(2):1;
  S.gk={d:Math.round(td),g:+tg.toFixed(2),v:Math.round(tv),t:Math.round(tt)};
  const avgIV=[...calls,...puts].reduce((s,o)=>s+(o.iv||.3),0)/Math.max(1,calls.length+puts.length);
  S.ivr=Math.min(100,Math.max(0,Math.round(avgIV*250)));
  const pcS=S.pcr>1.2?20:S.pcr<.7?80:50+(0.95-S.pcr)*80;
  const ivS=100-Math.min(100,avgIV*200);
  const dS=td>0?Math.min(100,50+td/200):Math.max(0,50+td/200);
  const gexN=S.gLv.reduce((s,l)=>s+l.net,0);
  S.fg=Math.round(pcS*.3+ivS*.25+dS*.25+(gexN>0?65:30)*.2)}

// ═══ P/L ═══
function calcPL(legs,spot){
  const mn=spot*.75,mx=spot*1.25,pts=[];
  for(let p=mn;p<=mx;p+=(mx-mn)/200){let pl=0;legs.forEach(l=>{
    const m=l.side==='buy'?1:-1;const intr=l.type==='call'?Math.max(0,p-l.strike):Math.max(0,l.strike-p);
    pl+=(intr-l.prem)*l.qty*m*100});pts.push({p,pl})}
  return{pts,mxP:Math.max(...pts.map(x=>x.pl)),mnP:Math.min(...pts.map(x=>x.pl)),
    bes:pts.reduce((a,x,i)=>{if(i>0&&((pts[i-1].pl<0&&x.pl>=0)||(pts[i-1].pl>=0&&x.pl<0)))a.push(+x.p.toFixed(2));return a},[])}}

// ═══ SERVER API (same as TADAWUL US PRO) ═══
async function fhQ(sym){
  try{const r=await fetch('/api/stock?symbol='+sym+'&range=1d&interval=5m');
    const d=await r.json();if(!d?.chart?.result?.[0])return null;
    const m=d.chart.result[0].meta;const prev=m.previousClose||m.chartPreviousClose||m.regularMarketPrice;
    return{price:m.regularMarketPrice,prev,chg:+(m.regularMarketPrice-prev).toFixed(2),pct:+(((m.regularMarketPrice-prev)/prev)*100).toFixed(2),hi:m.regularMarketDayHigh||m.regularMarketPrice,lo:m.regularMarketDayLow||m.regularMarketPrice};
  }catch(e){return null}}

// ═══ OPTIONS API (same as TADAWUL US PRO) ═══
async function fOpts(sym,date){
  try{
    let u='/api/options?symbol='+sym;if(date)u+='&date='+date;
    const r=await fetch(u);const d=await r.json();
    if(!d?.optionChain?.result?.[0])return null;
    const R=d.optionChain.result[0],Q=R.quote||{},O=R.options?.[0]||{};
    const map=arr=>(arr||[]).map(o=>({k:o.strike,last:o.lastPrice,bid:o.bid,ask:o.ask,vol:o.volume||0,oi:o.openInterest||0,iv:o.impliedVolatility,itm:o.inTheMoney,exp:o.expiration}));
    return{ok:1,sym:Q.symbol||sym,price:Q.regularMarketPrice||S.price,exps:R.expirationDates||[],exp:O.expirationDate,calls:map(O.calls),puts:map(O.puts)};
  }catch(e){return null}}

// ═══ TRADINGVIEW CHART ═══
function loadChart(sym){
  $('tvChart').src='https://s.tradingview.com/widgetembed/?frameElementId=tvChart&symbol='+sym+'&interval=15&hidesidetoolbar=0&symboledit=1&saveimage=0&toolbarbg=0b1120&studies=MASimple%4050&theme=dark&style=1&timezone=America%2FNew_York&studies_overrides=%7B%7D&overrides=%7B%7D&enabled_features=%5B%5D&disabled_features=%5B%5D&locale=ar_AE&utm_source=localhost&utm_medium=widget&utm_campaign=chart'}

// ═══ FLOW ALERTS ═══
function genFlow(){
  const alerts=[];
  const proc=(arr,side)=>{arr.forEach(o=>{
    if((o.vol||0)>Math.max(o.oi||0,100)*1.3&&(o.vol||0)>200){
      const prem=(o.ask||o.last||0)*(o.vol||0)*100;
      alerts.push({sym:S.sym,k:o.k,side,type:(o.vol||0)>Math.max(o.oi||0,1)*3?'SWEEP':(o.vol||0)>2000?'BLOCK':'UNQ',
        vol:o.vol,oi:o.oi,prem,bull:side==='CALL',
        sc:Math.min(100,Math.round(((o.vol||0)/Math.max(o.oi||0,1))*18+(prem>500000?25:prem>100000?12:0))),
        t:new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'})})}})};
  proc(S.calls,'CALL');proc(S.puts,'PUT');
  alerts.sort((a,b)=>b.prem-a.prem);S.flow=alerts.slice(0,20);rSF()}

// ═══ LOAD SYMBOL ═══
async function go(sym){
  if(S.loading)return;
  S.loading=1;S.sym=sym;$('sym').value=sym;
  // Load TradingView chart immediately
  loadChart(sym);
  // Fetch quote from server API
  const q=await fhQ(sym);
  if(q){
    S.price=q.price;S.prev=q.prev;S.name=sym;
    $('sN').textContent=sym;$('sP').textContent='$'+fN(q.price);
    $('sP').style.color=q.chg>=0?'var(--g)':'var(--r)';
    const ce=$('sC');ce.textContent=(q.chg>=0?'+':'')+fN(q.chg)+' ('+q.pct+'%)';
    ce.style.background=q.chg>=0?'var(--g3)':'var(--r3)';ce.style.color=q.chg>=0?'var(--g)':'var(--r)';
    $('sH').textContent='$'+fN(q.hi);$('sL').textContent='$'+fN(q.lo);
    S.wlD[sym]={price:q.price,chg:q.chg,pct:q.pct};
  }
  // Fetch options from Yahoo
  const od=await fOpts(sym);
  if(od&&(od.calls?.length||od.puts?.length)){
    S.calls=od.calls||[];S.puts=od.puts||[];S.exps=od.exps||[];S.exp=od.exp;
    S.gLv=calcGEX(S.calls,S.puts,S.price);calcAgg(S.calls,S.puts,S.price);
    $('sIV').textContent=S.ivr+'%';$('sIV').style.color=S.ivr>60?'var(--r)':S.ivr<30?'var(--g)':'var(--y)';
    $('sPC').textContent=S.pcr;$('sPC').style.color=S.pcr>1?'var(--r)':S.pcr<.7?'var(--g)':'var(--t2)';
    const tg=S.gLv.reduce((s,l)=>s+l.net,0);
    $('sGX').textContent=fK(Math.abs(tg));$('sGX').style.color=tg>=0?'var(--g)':'var(--r)';
    $('sDF').textContent=S.gk.d>0?'صعودي↑':'هبوطي↓';$('sDF').style.color=S.gk.d>0?'var(--g)':'var(--r)';
    genFlow();
  }
  sT(S.tab);rWL();uAQ();S.loading=0}

// ═══ TABS ═══
function sT(tab,btn){S.tab=tab;
  const tabs=['sig','opt','gam','grk','str','fg','flw','pos'];
  document.querySelectorAll('.tb').forEach((b,i)=>b.classList.toggle('on',tabs[i]===tab));
  const el=$('tC');
  ({sig:rSig,opt:rOpt,gam:rGam,grk:rGrk,str:rStr,fg:rFG,flw:rFlw,pos:rPos})[tab]?.(el)}

// ═══ GAMMA WALL ═══

  const flip=lv.find((l,i)=>i>0&&lv[i-1].net*l.net<0),tN=lv.reduce((s,l)=>s+l.net,0);

  if(!S.stL.length&&S.calls.length)aPre('Long Call');else rL()}
function aPre(name){
  S.stP=name;const ks=[...new Set([...S.calls,...S.puts].map(o=>o.k))].sort((a,b)=>a-b);if(!ks.length)return;
  const ai=ks.reduce((b,s,i)=>Math.abs(s-S.price)<Math.abs(ks[b]-S.price)?i:b,0);
  const gS=o=>ks[Math.max(0,Math.min(ks.length-1,ai+o))];
  const gP=(k,t,sd)=>{const a=t==='call'?S.calls:S.puts;const o=a.find(x=>x.k===k)||{ask:5,bid:4};return sd==='buy'?(o.ask||o.last||5):(o.bid||o.last||4)};
  const defs={'Long Call':[{t:'call',s:'buy',q:1,o:0}],'Long Put':[{t:'put',s:'buy',q:1,o:0}],
    'Bull Spread':[{t:'call',s:'buy',q:1,o:0},{t:'call',s:'sell',q:1,o:2}],
    'Bear Spread':[{t:'put',s:'buy',q:1,o:0},{t:'put',s:'sell',q:1,o:-2}],
    'Iron Condor':[{t:'put',s:'buy',q:1,o:-3},{t:'put',s:'sell',q:1,o:-1},{t:'call',s:'sell',q:1,o:1},{t:'call',s:'buy',q:1,o:3}],
    'Straddle':[{t:'call',s:'buy',q:1,o:0},{t:'put',s:'buy',q:1,o:0}],
    'Strangle':[{t:'call',s:'buy',q:1,o:2},{t:'put',s:'buy',q:1,o:-2}]};
  S.stL=(defs[name]||defs['Long Call']).map(l=>{const k=gS(l.o);return{type:l.t,side:l.s,qty:l.q,strike:k,prem:gP(k,l.t,l.s)}});
  document.querySelectorAll('.spb').forEach(b=>b.classList.toggle('on',b.textContent===name));rL()}
function rL(){
  const el=$('stL');if(!el)return;

  el.innerHTML=S.stL.map((l,i)=>'<div class="sl2"><span style="font-size:8px;color:var(--t3)">#'+(i+1)+'</span>'+
    '<select onchange="uL('+i+',\'side\',this.value)"><option value="buy"'+(l.side==='buy'?' selected':'')+'>شراء</option><option value="sell"'+(l.side==='sell'?' selected':'')+'>بيع</option></select>'+

    '<select onchange="uL('+i+',\'strike\',+this.value)" style="width:80px">'+ks.map(k=>'<option value="'+k+'"'+(k===l.strike?' selected':'')+'>$'+fN(k,k>=100?0:2)+'</option>').join('')+'</select>'+
    '<input type="number" value="'+l.prem+'" step="0.1" onchange="uL('+i+',\'prem\',+this.value)" style="width:55px">'+
    '<span style="font-size:8px;color:var(--t3)">$'+fN(l.prem*l.qty*100*(l.side==='buy'?-1:1))+'</span>'+
    '<button onclick="S.stL.splice('+i+',1);rL()" style="color:var(--r);font-size:11px">✕</button></div>').join('');
  dPL()}
function uL(i,f,v){S.stL[i][f]=v;rL()}
function dPL(){
  const cv=$('plC');if(!cv||!S.stL.length)return;const ctx=cv.getContext('2d');const dpr=window.devicePixelRatio||1;
  const W=cv.parentElement.clientWidth,H=180;cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';ctx.scale(dpr,dpr);
  const pad={t:10,r:40,b:18,l:4};const{pts,mxP,mnP,bes}=calcPL(S.stL,S.price);if(!pts.length)return;
  const mnX=pts[0].p,mxX=pts[pts.length-1].p,mnY=Math.min(mnP*1.2,-100),mxY=Math.max(mxP*1.2,100);
  const toX=p=>pad.l+(p-mnX)/(mxX-mnX)*(W-pad.l-pad.r),toY=v=>pad.t+(1-(v-mnY)/(mxY-mnY))*(H-pad.t-pad.b);
  ctx.fillStyle='#060a12';ctx.fillRect(0,0,W,H);
  const zY=toY(0);ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,zY);ctx.lineTo(W-pad.r,zY);ctx.stroke();
  ctx.beginPath();pts.forEach((p,i)=>{i===0?ctx.moveTo(toX(p.p),toY(p.pl)):ctx.lineTo(toX(p.p),toY(p.pl))});
  ctx.lineTo(toX(pts[pts.length-1].p),zY);ctx.lineTo(toX(pts[0].p),zY);ctx.closePath();
  const gr=ctx.createLinearGradient(0,pad.t,0,H-pad.b);gr.addColorStop(0,'rgba(0,255,136,.1)');gr.addColorStop(.5,'transparent');gr.addColorStop(1,'rgba(255,45,85,.1)');ctx.fillStyle=gr;ctx.fill();
  ctx.beginPath();ctx.strokeStyle='#ffd000';ctx.lineWidth=1.5;pts.forEach((p,i)=>{i===0?ctx.moveTo(toX(p.p),toY(p.pl)):ctx.lineTo(toX(p.p),toY(p.pl))});ctx.stroke();
  bes.forEach(b=>{ctx.fillStyle='#00f0ff';ctx.beginPath();ctx.arc(toX(b),zY,3,0,Math.PI*2);ctx.fill();ctx.font='7px IBM Plex Mono';ctx.textAlign='center';ctx.fillText('$'+fN(b),toX(b),zY+10)});
  const cost=S.stL.reduce((s,l)=>s+l.prem*l.qty*100*(l.side==='buy'?1:-1),0);const ratio=mnP!==0?mxP/Math.abs(mnP):Infinity;
  const stE=$('stS');if(stE)stE.innerHTML=
    '<div class="si"><div class="sl3">أقصى ربح</div><div class="sv3" style="color:var(--g)">'+(mxP>1e7?'∞':'$'+fK(mxP))+'</div></div>'+
    '<div class="si"><div class="sl3">أقصى خسارة</div><div class="sv3" style="color:var(--r)">$'+fK(Math.abs(mnP))+'</div></div>'+
    '<div class="si"><div class="sl3">تعادل</div><div class="sv3" style="color:var(--c)">'+(bes.map(b=>'$'+fN(b)).join('/')||'-')+'</div></div>'}

  const lc=fg>75?'var(--g)':fg>60?'var(--g)':fg>40?'var(--y)':fg>25?'var(--o)':'var(--r)';
  el.innerHTML='<div style="font-size:12px;font-weight:800;margin-bottom:6px;text-align:center">😱 خوف/طمع</div>'+
    '<div class="fv" style="color:'+lc+'">'+fg+'</div><div style="text-align:center;font-size:12px;font-weight:700;color:'+lc+';margin-bottom:8px">'+lbl+'</div>'+
    '<div class="fg2"><div class="ff"><span>P/C</span><span style="color:'+(S.pcr>1?'var(--r)':'var(--g)')+'">'+S.pcr+'</span></div>'+
    '<div class="ff"><span>IVR</span><span style="color:'+(S.ivr>50?'var(--r)':'var(--g)')+'">'+S.ivr+'%</span></div>'+
    '<div class="ff"><span>Delta</span><span style="color:'+(S.gk.d>0?'var(--g)':'var(--r)')+'">'+( S.gk.d>0?'صعودي':'هبوطي')+'</span></div>'+
    '<div class="ff"><span>GEX</span><span style="color:'+(S.gLv.reduce((s,l)=>s+l.net,0)>0?'var(--g)':'var(--r)')+'">'+( S.gLv.reduce((s,l)=>s+l.net,0)>0?'+':'-')+'</span></div></div>'+
    '<div class="gs" style="margin-top:6px">'+(fg>70?'⚠️ طمع — احتمال تصحيح':fg<30?'💡 خوف — فرصة شراء محتملة':'✅ متوازن')+'</div>'}

// ═══ FLOW ═══
function rFlw(el){if(!S.flow.length){el.innerHTML='<div class="ld">لا تنبيهات</div>';return}
  el.innerHTML='<div style="font-size:12px;font-weight:800;margin-bottom:5px">🌊 تدفق السيولة</div>'+
    S.flow.map(a=>'<div class="fl'+(a.bull?'':' br')+'"><b style="min-width:35px">'+a.sym+'</b> <span class="bd '+(a.bull?'bd-g':'bd-r')+'">'+a.side+'</span> <span class="bd '+(a.type==='SWEEP'?'bd-y':'bd-b')+'">'+a.type+'</span> <b>$'+fN(a.k,0)+'</b> <span style="color:var(--t3)">V:'+fK(a.vol)+'</span> <b style="color:'+(a.bull?'var(--g)':'var(--r)')+'">$'+fK(a.prem)+'</b></div>').join('')}

// ═══ POSITION CALC ═══
function rPos(el){
  el.innerHTML='<div style="font-size:12px;font-weight:800;margin-bottom:6px">💰 حاسبة المركز</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px">'+
    ['رأس المال ($)|pcCap|10000','مخاطرة (%)|pcR|2','سعر العقد ($)|pcE|5','وقف خسارة ($)|pcS|3','هدف 1 ($)|pcT1|7.5','هدف 2 ($)|pcT2|12'].map(s=>{const[l,id,v]=s.split('|');
      return'<div><label style="font-size:8px;color:var(--t3)">'+l+'</label><input id="'+id+'" type="number" value="'+v+'" style="width:100%;background:var(--c2);border:1px solid var(--brd);border-radius:5px;padding:4px;font-family:var(--m)" onchange="cPos()"></div>'}).join('')+'</div><div id="pcR2"></div>';
  setTimeout(cPos,30)}
function cPos(){
  const cap=+($('pcCap')?.value||10000),rsk=+($('pcR')?.value||2),entry=+($('pcE')?.value||5),stop=+($('pcS')?.value||3),t1=+($('pcT1')?.value||7.5),t2=+($('pcT2')?.value||12);
  const rA=cap*(rsk/100),rPC=(entry-stop)*100;if(rPC<=0){$('pcR2').innerHTML='<div style="color:var(--r)">⚠️ وقف الخسارة يجب أن يكون أقل من الدخول</div>';return}
  const ct=Math.max(1,Math.floor(rA/rPC)),cost=entry*ct*100,mL=rPC*ct,g1=(t1-entry)*ct*100,g2=(t2-entry)*ct*100;
  $('pcR2').innerHTML='<div class="gs" style="border-right-color:var(--g)"><b style="color:var(--gd)">📊 النتيجة:</b><br>'+
    '📦 عقود: <b style="font-size:14px;color:var(--g)">'+ct+'</b> | 💵 تكلفة: $'+fN(cost)+' ('+fN(cost/cap*100)+'%)<br>'+
    '🛡 خسارة: <span style="color:var(--r)">$'+fN(mL)+'</span> | 🎯1: <span style="color:var(--g)">+$'+fN(g1)+' ('+fN(g1/cost*100)+'%)</span> | 🎯2: <span style="color:var(--g)">+$'+fN(g2)+' ('+fN(g2/cost*100)+'%)</span><br>'+
    '📊 R:R(1): <b style="color:var(--gd)">'+fN(g1/mL)+'x</b> | R:R(2): <b style="color:var(--gd)">'+fN(g2/mL)+'x</b></div>'}

// ═══ SIDE PANEL ═══
function rSF(){const el=$('sf');if(!el)return;
  el.innerHTML=S.flow.slice(0,5).map(a=>'<div class="fl'+(a.bull?'':' br')+'" style="font-size:8px;padding:2px 4px"><b>'+a.sym+'</b> <span class="bd '+(a.bull?'bd-g':'bd-r')+'" style="font-size:7px">'+a.side+'</span> $'+fN(a.k,0)+' '+a.type+'</div>').join('')}
function rWL(){const el=$('wl');if(!el)return;
  el.innerHTML=S.wl.map(sym=>{const d=S.wlD[sym]||{};const up=(d.chg||0)>=0;
    return'<div class="wi'+(sym===S.sym?' ac':'')+'" onclick="go(\''+sym+'\')"><span style="font-weight:700">'+sym+'</span>'+
    '<span style="font-family:var(--m);color:'+(up?'var(--g)':'var(--r)')+'">'+( d.price?'$'+fN(d.price):'—')+
    (d.pct?' <span style="font-size:8px">'+(up?'+':'')+d.pct+'%</span>':'')+'</span></div>'}).join('')}

// ═══ AI ═══
async function sendAI(){const inp=$('ain');const msg=inp.value.trim();if(!msg)return;inp.value='';
  const ms=$('am');ms.innerHTML+='<div class="ai u">'+msg+'</div>';ms.innerHTML+='<div class="ai bt" id="aiT">⏳...</div>';ms.scrollTop=ms.scrollHeight;
  const ctx='السهم:'+S.sym+' السعر:$'+S.price+' P/C:'+S.pcr+' IVR:'+S.ivr+'% Delta:'+S.gk.d+' F/G:'+S.fg+' GEX:'+(S.gLv.reduce((s,l)=>s+l.net,0)>0?'+':'-')+' Calls:'+S.calls.length+' Puts:'+S.puts.length;
  try{const r=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,context:ctx})});
    const d=await r.json();const t=$('aiT');if(t)t.outerHTML='<div class="ai bt">'+(d.reply||d.error||'خطأ')+'</div>'}
  catch(e){const t=$('aiT');if(t)t.outerHTML='<div class="ai bt" style="border-right-color:var(--r)">⚠️ أضف ANTHROPIC_API_KEY في Vercel</div>'}
  ms.scrollTop=ms.scrollHeight}
function askAI(q){$('ain').value=q;sendAI()}
function uAQ(){$('aqW').innerHTML=[['⚡ فرصة','أفضل فرصة Weekly لـ '+S.sym],['🧱 γ','جدار الغاما لـ '+S.sym],['🎯 دخول','نقطة دخول لـ '+S.sym+' CALL Weekly'],['📊 Greeks','حلل Greeks لـ '+S.sym]].map(([l,q])=>'<button class="aqb" onclick="askAI(\''+q+'\')">'+l+'</button>').join('')}

// ═══ CONTROLS ═══
async function chgE(exp){const od=await fOpts(S.sym,exp);if(od){S.calls=od.calls||[];S.puts=od.puts||[];S.exp=od.exp;S.gLv=calcGEX(S.calls,S.puts,S.price);calcAgg(S.calls,S.puts,S.price);sT(S.tab)}}

// ═══ WATCHLIST LOADER ═══
async function loadWL(){
  
  for(let i=0;i<S.wl.length;i+=6){
    const chunk=S.wl.slice(i,i+6);
    await Promise.all(chunk.map(async sym=>{const q=await fhQ(sym);if(q)S.wlD[sym]={price:q.price,chg:q.chg,pct:q.pct}}));
    rWL();if(i+6<S.wl.length)await new Promise(r=>setTimeout(r,400))}}

// ═══ CLOCK ═══
function tick(){const now=new Date();$('clk').textContent=now.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
  const et=new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));const h=et.getHours(),m=et.getMinutes(),dy=et.getDay();
  const open=dy>=1&&dy<=5&&(h>9||(h===9&&m>=30))&&h<16;const ms=$('ms');
  if(open){ms.textContent='🟢 مفتوح';ms.className='bd bd-g'}
  else if(dy>=1&&dy<=5&&h>=4&&(h<9||(h===9&&m<30))){ms.textContent='🟡 ما قبل';ms.className='bd bd-y'}
  else if(dy>=1&&dy<=5&&h>=16&&h<20){ms.textContent='🟠 ما بعد';ms.className='bd bd-o'}
  else{ms.textContent='🔴 مغلق';ms.className='bd bd-r'}}

// ═══ INIT ═══
tick();setInterval(tick,1000);
go('AAPL');setTimeout(loadWL,1000)
setInterval(()=>{if(!S.loading)go(S.sym)},90000);
</script>
